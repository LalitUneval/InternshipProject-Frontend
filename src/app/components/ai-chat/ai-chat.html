<!-- Backdrop -->
<div class="chat-backdrop" *ngIf="isOpen" (click)="toggleChat()"></div>

<!-- Floating Button (draggable) -->
<div class="chat-toggle"
     [style.bottom.px]="btnBottom"
     [style.right.px]="btnRight"
     (mousedown)="onDragStart($event)"
     (click)="onToggleClick($event)">
  <i class="bi bi-chat-dots"></i>
</div>

<!-- Chat Box -->
<div class="chat-box" *ngIf="isOpen"
     [style.bottom.px]="chatBottom"
     [style.right.px]="chatRight">

  <div class="chat-header">
    <span>AI Assistant</span>
    <i class="bi bi-x" (click)="toggleChat()"></i>
  </div>

  <div class="chat-body" #chatContainer>
    <div *ngFor="let msg of messages; trackBy: trackByMessageId"
      [ngClass]="msg.sender === 'user' ? 'user-msg' : 'bot-msg'">
      <div [innerHTML]="msg.text"></div>
    </div>

    <!-- Loading indicator -->
    <div class="bot-msg" *ngIf="isLoading">
      <span class="typing-indicator">
        <span></span><span></span><span></span>
      </span>
    </div>
  </div>

  <div class="chat-footer">
    <input [(ngModel)]="userInput"
           placeholder="Type message..."
           (keyup.enter)="sendMessage()" />
    <button (click)="sendMessage()" [disabled]="isLoading">
      <i class="bi bi-send"></i>
    </button>
  </div>

</div>
